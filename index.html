<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>TikTok Video Banner Maker</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    #credit {
      position: fixed;
      bottom: 10px;
      right: 15px;
      font-size: 12px;
      color: #aaa;
    }

    h1 {
      font-size: 32px;
      margin: 0 0 20px 0;
      font-weight: normal;
    }

    /* Drop zone */
    #drop-zone {
      border: 2px dashed #444;
      padding: 40px 60px;
      text-align: center;
      cursor: pointer;
      color: #aaa;
      font-size: 14px;
      transition: border-color 0.2s, color 0.2s;
    }

    #drop-zone:hover, #drop-zone.drag-over {
      border-color: #aaa;
      color: white;
    }

    #drop-zone input[type="file"] {
      display: none;
    }

    #drop-zone label {
      cursor: pointer;
    }

    #drop-zone label span {
      color: white;
      text-decoration: underline;
    }

    /* Crop area */
    #app {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 90vw;
      max-width: 720px;
    }

    #app.visible {
      display: flex;
    }

    #crop-box {
      position: relative;
      width: 100%;
      overflow: hidden;
      background: #000;
      cursor: move;
      user-select: none;
      touch-action: none;
    }

    /* 1260:654 aspect ratio */
    #crop-box::before {
      content: '';
      display: block;
      padding-top: calc(654 / 1260 * 100%);
    }

    #preview-img {
      position: absolute;
      top: 0;
      left: 0;
      draggable: false;
    }

    /* Controls */
    .controls {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 13px;
      color: #aaa;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .row label {
      width: 40px;
      text-align: right;
      flex-shrink: 0;
    }

    .row input[type="range"] {
      flex: 1;
      accent-color: white;
      cursor: pointer;
    }

    .row .num {
      width: 40px;
      font-size: 12px;
      color: #555;
    }

    .buttons {
      display: flex;
      gap: 12px;
      margin-top: 4px;
    }

    button {
      font-family: Arial, sans-serif;
      font-size: 13px;
      cursor: pointer;
      padding: 8px 22px;
      border: none;
    }

    #download-btn {
      background: white;
      color: #111;
    }

    #download-btn:hover {
      background: #ddd;
    }

    #reset-btn {
      background: none;
      border: 1px solid #444;
      color: #aaa;
    }

    #reset-btn:hover {
      border-color: #aaa;
      color: white;
    }

    canvas {
      display: none;
    }
  </style>
</head>
<body>

  <h1>TikTok Video Banner Maker</h1>

  <div id="drop-zone">
    <input type="file" id="file-input" accept="image/*">
    <label for="file-input">
      <span>Choose an image</span> — or drag it here<br>
      <small style="color:#555;font-size:11px;margin-top:8px;display:block;">Cropped to 1260 × 654 px</small>
    </label>
  </div>

  <div id="app">
    <div id="crop-box">
      <img id="preview-img" src="" alt="" draggable="false">
    </div>

    <div class="controls">
      <div class="row">
        <label>Zoom</label>
        <input type="range" id="zoom" min="0.05" max="4" step="0.01" value="1">
        <span class="num" id="zoom-v">1.00</span>
      </div>
    </div>

    <div class="buttons">
      <button id="download-btn">Download</button>
      <button id="reset-btn">New image</button>
    </div>
  </div>

  <canvas id="out"></canvas>

  <div id="credit">Made by Jeppe Rask Jensen</div>

  <script>
    const OUT_W = 1260, OUT_H = 654;

    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const app = document.getElementById('app');
    const cropBox = document.getElementById('crop-box');
    const img = document.getElementById('preview-img');
    const canvas = document.getElementById('out');
    const ctx = canvas.getContext('2d');

    const zoomSlider = document.getElementById('zoom');

    let zoom = 1, ox = 0, oy = 0;
    let natW = 0, natH = 0;

    // Drag state
    let dragging = false, lx = 0, ly = 0;

    // File load
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const f = e.dataTransfer.files[0];
      if (f && f.type.startsWith('image/')) load(f);
    });
    fileInput.addEventListener('change', () => { if (fileInput.files[0]) load(fileInput.files[0]); });

    function load(file) {
      const reader = new FileReader();
      reader.onload = e => {
        img.src = e.target.result;
        img.onload = () => {
          natW = img.naturalWidth;
          natH = img.naturalHeight;
          fit();
          dropZone.style.display = 'none';
          app.classList.add('visible');
        };
      };
      reader.readAsDataURL(file);
    }

    function fit() {
      const bw = cropBox.clientWidth;
      const bh = bw * (OUT_H / OUT_W);
      zoom = Math.max(bw / natW, bh / natH);
      ox = 0; oy = 0;
      zoomSlider.value = zoom;
      render();
    }

    function render() {
      const bw = cropBox.clientWidth;
      const bh = bw * (OUT_H / OUT_W);
      const sw = natW * zoom;
      const sh = natH * zoom;
      const left = (bw - sw) / 2 + ox;
      const top  = (bh - sh) / 2 + oy;
      img.style.width  = sw + 'px';
      img.style.height = sh + 'px';
      img.style.left   = left + 'px';
      img.style.top    = top  + 'px';
      document.getElementById('zoom-v').textContent = zoom.toFixed(2);
    }

    zoomSlider.addEventListener('input', () => { zoom = parseFloat(zoomSlider.value); render(); });

    // Mouse drag
    cropBox.addEventListener('mousedown', e => { dragging = true; lx = e.clientX; ly = e.clientY; cropBox.style.cursor = 'grabbing'; });
    window.addEventListener('mousemove', e => {
      if (!dragging) return;
      ox += e.clientX - lx; oy += e.clientY - ly;
      lx = e.clientX; ly = e.clientY;
      render();
    });
    window.addEventListener('mouseup', () => { dragging = false; cropBox.style.cursor = 'move'; });

    // Touch drag
    cropBox.addEventListener('touchstart', e => { lx = e.touches[0].clientX; ly = e.touches[0].clientY; });
    cropBox.addEventListener('touchmove', e => {
      e.preventDefault();
      ox += e.touches[0].clientX - lx; oy += e.touches[0].clientY - ly;
      lx = e.touches[0].clientX; ly = e.touches[0].clientY;
      render();
    }, { passive: false });

    // Scroll to zoom
    cropBox.addEventListener('wheel', e => {
      e.preventDefault();
      zoom = Math.min(4, Math.max(0.05, zoom - e.deltaY * 0.001));
      zoomSlider.value = zoom;
      render();
    }, { passive: false });

    // Download
    document.getElementById('download-btn').addEventListener('click', () => {
      canvas.width = OUT_W;
      canvas.height = OUT_H;
      const bw = cropBox.clientWidth;
      const scale = OUT_W / bw;
      const bh = bw * (OUT_H / OUT_W);
      const sw = natW * zoom;
      const sh = natH * zoom;
      const left = (bw - sw) / 2 + ox;
      const top  = (bh - sh) / 2 + oy;
      ctx.clearRect(0, 0, OUT_W, OUT_H);
      ctx.drawImage(img, left * scale, top * scale, sw * scale, sh * scale);
      const a = document.createElement('a');
      a.download = '1.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
    });

    // Reset
    document.getElementById('reset-btn').addEventListener('click', () => {
      img.src = '';
      app.classList.remove('visible');
      dropZone.style.display = '';
      fileInput.value = '';
    });
  </script>

</body>
</html>
